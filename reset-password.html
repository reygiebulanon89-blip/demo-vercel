<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password - WasteLess</title>

<!-- Favicon -->
<link rel="icon" type="image/svg+xml" href="/logo.png">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(180deg, #0b2e13, #1b5e20, #66bb6a);
    color: white;
}

.auth-container {
    width: 400px;
    max-width: 90%;
    padding: 40px;
    border-radius: 22px;
    background: rgba(255, 255, 255, 0.08);
    backdrop-filter: blur(15px);
    text-align: center;
}

.auth-container h2 {
    margin-bottom: 10px;
    color: #a5d6a7;
}

.auth-container p {
    font-size: 13px;
    margin-bottom: 20px;
    color: #e8f5e9;
    opacity: 0.9;
}

.password-field {
    position: relative;
    margin-bottom: 15px;
}

.password-field input {
    width: 100%;
    padding: 12px;
    padding-right: 40px;
    border-radius: 10px;
    border: none;
    outline: none;
}

.toggle-password {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    cursor: pointer;
    font-size: 14px;
    opacity: 0.7;
    color: black;
}

.toggle-password:hover {
    opacity: 1;
}

.auth-btn {
    width: 100%;
    padding: 12px;
    background: #2e7d32;
    color: white;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-weight: 600;
    margin-top: 10px;
}

.auth-btn:hover {
    background: #1b5e20;
}

.auth-btn.loading {
    opacity: 0.7;
    pointer-events: none;
}

#errorMsg {
    color: #ef5350;
    font-size: 13px;
    margin-top: 10px;
    display: none;
}

#successMsg {
    color: #66bb6a;
    font-size: 13px;
    margin-top: 10px;
    display: none;
}

.password-requirements {
    font-size: 11px;
    color: #a5d6a7;
    margin-bottom: 15px;
    padding: 10px;
    background: rgba(46, 125, 50, 0.2);
    border-radius: 8px;
    text-align: left;
}

.password-requirements ul {
    list-style: none;
    margin-top: 5px;
}

.password-requirements li {
    margin: 3px 0;
    padding-left: 18px;
    position: relative;
}

.password-requirements li::before {
    content: "○";
    position: absolute;
    left: 0;
}

.password-requirements li.valid {
    color: #66bb6a;
}

.password-requirements li.valid::before {
    content: "●";
}

.back-link {
    display: block;
    margin-top: 20px;
    color: #a5d6a7;
    text-decoration: none;
    font-size: 13px;
}

.back-link:hover {
    text-decoration: underline;
}
</style>
</head>
<body>

<div class="auth-container">
    <h2>Reset Password</h2>
    <p>Please enter your new password below.</p>

    <div id="formContent">
        <div class="password-field">
            <input type="password" id="newPassword" placeholder="New Password">
            <span class="toggle-password" onclick="togglePassword('newPassword', this)">👁️</span>
        </div>
        
        <div class="password-requirements">
            Password must have:
            <ul>
                <li id="req-length">At least 8 characters</li>
                <li id="req-upper">One uppercase letter</li>
                <li id="req-lower">One lowercase letter</li>
                <li id="req-number">One number</li>
            </ul>
        </div>

        <div class="password-field">
            <input type="password" id="confirmPassword" placeholder="Confirm Password">
            <span class="toggle-password" onclick="togglePassword('confirmPassword', this)">👁️</span>
        </div>

        <button class="auth-btn" id="resetBtn" onclick="handleReset()">Reset Password</button>
    </div>

    <div id="errorMsg"></div>
    <div id="successMsg"></div>

    <a href="index.html" class="back-link">Back to Login</a>
</div>

<script>
// Get token from URL
const urlParams = new URLSearchParams(window.location.search);
const token = urlParams.get('token');

if (!token) {
    document.getElementById('formContent').style.display = 'none';
    const errorMsg = document.getElementById('errorMsg');
    errorMsg.textContent = 'Invalid or missing reset token.';
    errorMsg.style.display = 'block';
}

function togglePassword(inputId, toggleBtn) {
    const input = document.getElementById(inputId);
    if (input.type === "password") {
        input.type = "text";
        toggleBtn.textContent = "🔒";
    } else {
        input.type = "password";
        toggleBtn.textContent = "👁️";
    }
}

function validatePasswordRequirements(password) {
    const reqs = {
        length: password.length >= 8,
        upper: /[A-Z]/.test(password),
        lower: /[a-z]/.test(password),
        number: /[0-9]/.test(password)
    };
    
    document.getElementById("req-length").classList.toggle("valid", reqs.length);
    document.getElementById("req-upper").classList.toggle("valid", reqs.upper);
    document.getElementById("req-lower").classList.toggle("valid", reqs.lower);
    document.getElementById("req-number").classList.toggle("valid", reqs.number);
    
    return reqs.length && reqs.upper && reqs.lower && reqs.number;
}

document.getElementById("newPassword").addEventListener("input", function() {
    validatePasswordRequirements(this.value);
});

async function handleReset() {
    const newPassword = document.getElementById('newPassword').value;
    const confirmPassword = document.getElementById('confirmPassword').value;
    const errorMsg = document.getElementById('errorMsg');
    const successMsg = document.getElementById('successMsg');
    const btn = document.getElementById('resetBtn');

    errorMsg.style.display = 'none';
    successMsg.style.display = 'none';

    if (newPassword !== confirmPassword) {
        errorMsg.textContent = "Passwords do not match.";
        errorMsg.style.display = 'block';
        return;
    }

    if (!validatePasswordRequirements(newPassword)) {
        errorMsg.textContent = "Password does not meet the requirements.";
        errorMsg.style.display = 'block';
        return;
    }

    btn.classList.add('loading');
    btn.textContent = 'Resetting...';

    try {
        const response = await fetch('/api/auth/reset-password', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({ token, newPassword })
        });

        const data = await response.json();

        if (response.ok && data.status === 'success') {
            document.getElementById('formContent').style.display = 'none';
            successMsg.textContent = "Password reset successful! You can now log in.";
            successMsg.style.display = 'block';
        } else {
            errorMsg.textContent = data.message || "Failed to reset password.";
            errorMsg.style.display = 'block';
        }
    } catch (error) {
        errorMsg.textContent = "An error occurred. Please try again.";
        errorMsg.style.display = 'block';
    } finally {
        btn.classList.remove('loading');
        btn.textContent = 'Reset Password';
    }
}
</script>

</body>
</html>
