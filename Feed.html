<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WasteLess</title>
<script src="/api.service.js"></script>
<style>
* {
margin: 0;
padding: 0;
box-sizing: border-box;
font-family: 'Segoe UI', sans-serif;
}

:root {
--green-900: #1f5f27;
--green-800: #2e7d32;
--green-700: #43a047;
--green-100: #e9f6eb;
--green-50: #f6fbf7;
--text-900: #16301a;
--text-700: #4f5f52;
--line: #d8e6d9;
}

body {
min-height: 100vh;
background: #f7faf8;
color: var(--text-900);
}

.dashboard-shell {
min-height: 100vh;
display: flex;
}

.sidebar {
position: fixed;
inset: 0 auto 0 0;
width: 260px;
padding: 28px 18px;
background: linear-gradient(180deg, var(--green-900), var(--green-800));
color: #fff;
display: flex;
flex-direction: column;
gap: 28px;
box-shadow: 15px 0 40px rgba(0, 0, 0, 0.08);
}

.brand {
padding: 10px 12px 4px;
}

.brand h1 {
font-size: 30px;
line-height: 1;
margin-bottom: 8px;
}

.brand p {
font-size: 13px;
line-height: 1.5;
color: rgba(255, 255, 255, 0.8);
}

.nav {
display: flex;
flex-direction: column;
gap: 8px;
}

.nav-item {
display: flex;
align-items: center;
gap: 12px;
padding: 14px 16px;
border-radius: 14px;
color: rgba(255, 255, 255, 0.88);
text-decoration: none;
font-size: 14px;
font-weight: 600;
transition: background 0.2s ease, transform 0.2s ease;
}

.nav-item:hover {
background: rgba(255, 255, 255, 0.08);
transform: translateX(2px);
}

.nav-item.active {
background: rgba(255, 255, 255, 0.16);
box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.12);
}

.nav-icon {
width: 20px;
height: 20px;
flex: 0 0 20px;
stroke: currentColor;
stroke-width: 1.9;
fill: none;
stroke-linecap: round;
stroke-linejoin: round;
}

.sidebar-footer {
margin-top: auto;
padding: 8px;
}

.logout-btn {
width: 100%;
border: 1px solid rgba(255, 255, 255, 0.35);
background: rgba(255, 255, 255, 0.1);
color: #fff;
padding: 11px 14px;
border-radius: 12px;
font-size: 13px;
font-weight: 700;
cursor: pointer;
transition: background 0.2s ease, transform 0.2s ease;
}

.logout-btn:hover {
background: rgba(255, 255, 255, 0.2);
transform: translateY(-1px);
}

.main {
margin-left: 260px;
width: calc(100% - 260px);
padding: 28px;
}

.page {
width: min(860px, 100%);
margin: 0 auto;
padding: 0;
}

.header {
display: flex;
justify-content: space-between;
align-items: center;
gap: 16px;
margin-bottom: 18px;
}

.header h1 {
font-size: 30px;
font-weight: 700;
margin-bottom: 6px;
}

.header p {
font-size: 14px;
color: var(--text-700);
}

.notif-bell {
width: 42px;
height: 42px;
border-radius: 12px;
border: 1px solid var(--line);
background: #fff;
color: var(--green-800);
display: inline-flex;
align-items: center;
justify-content: center;
line-height: 0;
position: relative;
cursor: pointer;
transition: background 0.2s ease, transform 0.2s ease;
}

.notif-bell:hover {
background: var(--green-50);
transform: translateY(-1px);
}

.notif-bell svg {
width: 18px;
height: 18px;
stroke: currentColor;
stroke-width: 1.9;
fill: none;
stroke-linecap: round;
stroke-linejoin: round;
}

.notif-dot {
position: absolute;
top: -6px;
right: -6px;
min-width: 18px;
height: 18px;
padding: 0 5px;
border-radius: 999px;
background: #e53935;
color: #fff;
font-size: 11px;
font-weight: 700;
display: inline-flex;
align-items: center;
justify-content: center;
line-height: 1;
border: 2px solid #fff;
}

.notif-dot.hidden {
display: none;
}

.notif-panel {
display: none;
position: absolute;
top: 52px;
right: 0;
width: min(360px, 88vw);
max-height: 360px;
overflow-y: auto;
background: #fff;
border: 1px solid var(--line);
border-radius: 14px;
box-shadow: 0 18px 45px rgba(0, 0, 0, 0.12);
padding: 10px;
z-index: 20;
}

.notif-panel.open {
display: block;
}

.notif-title {
font-size: 13px;
font-weight: 700;
color: var(--text-900);
padding: 6px 6px 10px;
border-bottom: 1px solid #edf2ee;
margin-bottom: 8px;
}

.notif-item {
padding: 10px;
border: 1px solid #edf3ee;
background: #f9fcfa;
border-radius: 10px;
font-size: 13px;
color: #344a37;
margin-bottom: 8px;
position: relative;
}

.notif-item:last-child {
margin-bottom: 0;
}

.notif-time {
display: block;
margin-top: 4px;
font-size: 11px;
color: var(--text-700);
}

.notif-delete {
position: absolute;
right: 8px;
top: 8px;
border: 1px solid #e5efe6;
background: #fff;
border-radius: 999px;
width: 26px;
height: 26px;
display: grid;
place-items: center;
cursor: pointer;
color: #5b6f5e;
font-weight: 800;
line-height: 1;
}

.notif-delete:hover {
background: #f4faf4;
}

.notif-empty {
font-size: 13px;
color: var(--text-700);
padding: 12px;
text-align: center;
}

.debug-panel {
margin-top: 12px;
padding: 12px;
border: 1px dashed #c9ddcc;
background: #f8fcf9;
border-radius: 10px;
font-size: 12px;
color: #37503b;
display: none;
}

.debug-panel.show {
display: block;
}

.debug-line {
margin: 3px 0;
word-break: break-word;
}

.panel {
background: #fff;
border: 1px solid var(--line);
border-radius: 16px;
padding: 16px;
}

.composer {
display: flex;
gap: 10px;
align-items: flex-start;
}

.composer input,
.comment-form input {
width: 100%;
padding: 11px 12px;
border-radius: 12px;
border: 1px solid #dbe7dc;
outline: none;
font-size: 14px;
background: #fff;
}

.composer input:focus,
.comment-form input:focus {
border-color: var(--green-700);
}

.btn {
border: 1px solid #d8e6d9;
background: #fff;
color: #2e7d32;
padding: 10px 14px;
border-radius: 12px;
font-size: 13px;
font-weight: 600;
cursor: pointer;
white-space: nowrap;
}

.btn:hover {
background: var(--green-50);
}

.suggestion {
margin-top: 14px;
display: flex;
justify-content: space-between;
align-items: center;
gap: 12px;
padding: 14px 16px;
border: 1px solid #dceadc;
border-radius: 16px;
background: #fbfefb;
}

.suggestion p {
font-size: 14px;
color: var(--text-900);
}

.feed {
margin-top: 18px;
background: #fff;
border: 1px solid var(--line);
border-radius: 16px;
overflow: hidden;
}

.post {
padding: 16px 18px;
border-bottom: 1px solid #edf2ee;
}

.post:last-child {
border-bottom: none;
}

.post-top {
display: flex;
justify-content: space-between;
align-items: flex-start;
gap: 12px;
margin-bottom: 8px;
}

.name {
font-size: 15px;
font-weight: 700;
margin-bottom: 3px;
}

.time {
font-size: 12px;
color: var(--text-700);
white-space: nowrap;
}

.message {
font-size: 14px;
line-height: 1.55;
color: #2f4032;
margin-bottom: 8px;
}

.detail {
font-size: 13px;
color: var(--text-700);
margin-bottom: 12px;
}

.actions {
display: flex;
gap: 8px;
align-items: center;
margin-bottom: 12px;
}

.action {
border: 1px solid #d8e6d9;
background: #fff;
border-radius: 999px;
padding: 7px 11px;
font-size: 12px;
font-weight: 600;
cursor: pointer;
color: #355539;
}

.action.active {
border-color: #b9d8bc;
background: var(--green-50);
color: var(--green-800);
}

.comments {
border-top: 1px solid #edf2ee;
padding-top: 12px;
display: none;
}

.comments.open {
display: block;
}

.comment-list {
display: flex;
flex-direction: column;
gap: 8px;
margin-bottom: 12px;
}

.comment {
font-size: 13px;
color: #3b4c3e;
padding: 8px 10px;
border-radius: 10px;
background: #f8fbf8;
border: 1px solid #edf3ee;
}

.comment-reply {
background: #fbfdfb;
border-left: 3px solid #d8ead9;
position: relative;
}

.comment-reply::before {
content: '';
position: absolute;
left: -11px;
top: 14px;
width: 10px;
height: 0;
border-top: 1px solid #d8ead9;
}

.comment-meta {
display: flex;
justify-content: space-between;
align-items: center;
gap: 8px;
margin-top: 6px;
font-size: 11px;
color: #6a7f6d;
}

.comment-reply-btn {
font-size: 11px;
padding: 4px 8px;
}

.comment-meta > div {
display: flex;
gap: 6px;
align-items: center;
}

.comment-own-actions {
display: flex;
gap: 6px;
align-items: center;
}

.comment-own-actions .action {
font-size: 11px;
padding: 4px 8px;
}

.replying-banner {
display: flex;
align-items: center;
justify-content: space-between;
gap: 8px;
font-size: 12px;
color: #3b5a40;
margin-bottom: 8px;
padding: 6px 8px;
border: 1px solid #e1ece2;
border-radius: 8px;
background: #f7fbf7;
}

.replying-banner span {
font-size: 11px;
color: #5f7764;
}

.comment-form {
display: flex;
gap: 8px;
align-items: center;
position: relative;
}

.comment-form .btn {
padding: 9px 12px;
}

.emoji-btn {
min-width: 40px;
padding: 9px 10px;
}

.emoji-picker {
position: absolute;
left: 0;
top: calc(100% + 6px);
display: none;
gap: 4px;
flex-wrap: wrap;
background: #fff;
border: 1px solid #d8e6d9;
border-radius: 10px;
padding: 8px;
max-width: 220px;
z-index: 10;
box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
}

.emoji-picker.open {
display: flex;
}

.emoji-option {
border: 1px solid #e3eee4;
background: #fff;
border-radius: 8px;
padding: 4px 6px;
cursor: pointer;
font-size: 16px;
line-height: 1;
}

.emoji-option:hover {
background: #f4faf4;
}

.status {
margin-top: 12px;
font-size: 13px;
color: var(--green-800);
min-height: 18px;
}

.empty {
padding: 18px;
font-size: 14px;
color: var(--text-700);
}

.post.badge-post {
display: flex;
flex-direction: column;
align-items: center;
text-align: center;
padding: 24px 18px;
}

.badge-display {
display: flex;
flex-direction: column;
align-items: center;
gap: 12px;
margin-bottom: 14px;
}

.badge-icon-large {
font-size: 56px;
}

.badge-name-post {
font-size: 18px;
font-weight: 700;
color: var(--text-900);
}

.badge-subtitle {
font-size: 13px;
color: var(--text-700);
}

@media (max-width: 640px) {

.sidebar {
position: static;
width: 100%;
border-radius: 0 0 22px 22px;
}

.main {
margin-left: 0;
width: 100%;
padding: 16px;
}

.page {
width: min(100%, 860px);
}

.composer,
.suggestion,
.comment-form,
.post-top {
flex-direction: column;
align-items: stretch;
}

.header {
align-items: flex-start;
}

.time {
white-space: normal;
}
}
</style>
</head>
<body>
<div class="dashboard-shell">
<aside class="sidebar">
<div class="brand">
<h1 style="display:flex;align-items:center;gap:10px;">
	<img src="/logo.png" alt="WasteLess Logo" style="height:34px;width:auto;display:inline-block;vertical-align:middle;">
	<span>WasteLess</span>
</h1>
<p>Manage waste tracking, insights, and sustainable actions from one place.</p>
</div>

<nav class="nav" aria-label="Primary">
<a class="nav-item active" href="Feed.html" aria-current="page">
<svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M4 5h16v11H8l-4 4z"></path><path d="M8 9h8"></path><path d="M8 13h5"></path></svg>
<span>Feed</span>
</a>
<a class="nav-item" href="track.html">
<svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 21s7-4.6 7-11a7 7 0 0 0-14 0c0 6.4 7 11 7 11z"></path><circle cx="12" cy="10" r="2.5"></circle></svg>
<span>Track</span>
</a>
<a class="nav-item" href="analytics.html">
<svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M5 19V5"></path><path d="M5 19h14"></path><path d="M8 15v-4"></path><path d="M12 15V8"></path><path d="M16 15v-6"></path></svg>
<span>Analytics</span>
</a>
<a class="nav-item" href="challenges.html">
<svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M8 4h8v3a4 4 0 0 1-8 0z"></path><path d="M12 11v4"></path><path d="M9 20h6"></path><path d="M7 7H4a4 4 0 0 0 4 4"></path><path d="M17 7h3a4 4 0 0 1-4 4"></path></svg>
<span>Challenges</span>
</a>
<a class="nav-item" href="profile.html">
<svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M20 21a8 8 0 0 0-16 0"></path><circle cx="12" cy="8" r="4"></circle></svg>
<span>Profile</span>
</a>
</nav>

<div class="sidebar-footer">
<button class="logout-btn" type="button" onclick="handleLogout()">Logout</button>
</div>
</aside>

<main class="main">
<section class="page">
<header class="header">
<div>
<h1>Community Feed</h1>
<p>Recent updates</p>
</div>
<div style="position: relative;">
<button class="notif-bell" id="notifBellBtn" type="button" aria-label="Notifications" title="Notifications">
<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6 9a6 6 0 1 1 12 0v5l2 2H4l2-2z"></path><path d="M10 18a2 2 0 0 0 4 0"></path></svg>
<span class="notif-dot hidden" id="notifDot">0</span>
</button>
<div class="notif-panel" id="notifPanel">
<div class="notif-title">Notifications</div>
<div id="notifList"></div>
</div>
</div>
</header>

<section class="panel" aria-label="Create post">
<div class="composer">
<input id="postInput" type="text" placeholder="Share your achievement..." maxlength="120">
<button class="btn" id="postBtn" type="button">Post</button>
</div>

<div class="suggestion" aria-label="Smart suggestion">
<p>You reduced water today. Share this?</p>
<button class="btn" id="shareBtn" type="button">Share</button>
</div>
<div class="status" id="composerStatus"></div>
<div class="debug-panel" id="notifDebugPanel">
<div class="debug-line"><strong>Notification Debug</strong></div>
<div class="debug-line" id="debugUserLine">User: -</div>
<div class="debug-line" id="debugPollLine">Last poll: -</div>
<div class="debug-line" id="debugTrackedLine">Tracked posts: -</div>
<div class="debug-line" id="debugLastEventLine">Last event: -</div>
<div class="debug-line" id="debugErrorLine">Last error: none</div>
</div>
</section>

<section class="feed" id="feed" aria-label="Feed posts"></section>
</section>
</main>
</div>

<script>
// Authentication check
if (!api.isAuthenticated()) {
window.location.href = 'index.html';
}

function handleLogout() {
api.logout();
window.location.href = 'index.html';
}

const feedEl = document.getElementById('feed');
const postInput = document.getElementById('postInput');
const postBtn = document.getElementById('postBtn');
const shareBtn = document.getElementById('shareBtn');
const composerStatus = document.getElementById('composerStatus');
const notifBellBtn = document.getElementById('notifBellBtn');
const notifDot = document.getElementById('notifDot');
const notifPanel = document.getElementById('notifPanel');
const notifList = document.getElementById('notifList');
const BADGE_SHARE_STORAGE_KEY = 'badgeToShare';
const BADGE_SHARE_CONSUMED_KEY = 'wastelessLastSharedBadgeTimestamp';

let posts = [];
let currentUser = null;
let notifications = [];
let unreadNotifications = 0;
let latestNotificationId = 0;
let notificationStream = null;
let notificationStreamRetryTimer = null;
let interactionSyncTimer = null;
const replyDraftByPostId = new Map();
const collapsedThreadByCommentId = new Map();
const COMMENT_EMOJIS = ['😀', '😍', '👏', '🔥', '🌱', '💚', '🎉', '🙌', '😂', '🤩', '🙏', '✨'];
const MAX_REPLY_DEPTH = 2;
const postInteractionBaseline = new Map();
let notificationPollTimer = null;
let currentUserId = null;
const debugEnabled = new URLSearchParams(window.location.search).get('debugNotif') === 'true';
let debugState = {
lastPollAt: null,
trackedPosts: [],
lastEvent: 'none',
lastError: 'none'
};

function showStatus(text) {
composerStatus.textContent = text;
setTimeout(() => {
if (composerStatus.textContent === text) composerStatus.textContent = '';
}, 2200);
}

function escapeHtml(text) {
return text.replace(/[&<>"]/g, (char) => ({
'&': '&amp;',
'<': '&lt;',
'>': '&gt;',
'"': '&quot;'
}[char]));
}

function timeAgo(timestamp) {
const now = new Date();
const time = new Date(timestamp);
const diffMs = now - time;
const diffMins = Math.floor(diffMs / 60000);
const diffHours = Math.floor(diffMs / 3600000);
const diffDays = Math.floor(diffMs / 86400000);

if (diffMins < 1) return 'just now';
if (diffMins < 60) return `${diffMins}m ago`;
if (diffHours < 24) return `${diffHours}h ago`;
if (diffDays < 7) return `${diffDays}d ago`;
return time.toLocaleDateString();
}

function formatClockTime(timestamp) {
const time = new Date(timestamp);
return `${time.toLocaleDateString()} ${time.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}`;
}

function getPostLikeCount(post) {
if (typeof post.like_count === 'number') return post.like_count;
if (typeof post.likes_count === 'number') return post.likes_count;
if (typeof post.likes === 'number') return post.likes;
return 0;
}

function setPostLikeCount(post, nextCount) {
post.like_count = Math.max(0, Number(nextCount) || 0);
post.likes_count = post.like_count;
}

function getPostCommentCount(post) {
if (typeof post.comment_count === 'number') return post.comment_count;
if (typeof post.comments_count === 'number') return post.comments_count;
if (typeof post.comments === 'number') return post.comments;
if (Array.isArray(post.comments)) return post.comments.length;
return 0;
}

function setPostCommentCount(post, nextCount) {
post.comment_count = Math.max(0, Number(nextCount) || 0);
post.comments_count = post.comment_count;
}

function getPostLikedByUser(post) {
if (typeof post.liked_by_user === 'boolean') return post.liked_by_user;
if (typeof post.liked_by_user === 'number') return post.liked_by_user === 1;
if (typeof post.is_liked === 'boolean') return post.is_liked;
if (typeof post.user_liked === 'boolean') return post.user_liked;
return false;
}

function setPostLikedByUser(post, liked) {
post.liked_by_user = Boolean(liked);
post.is_liked = Boolean(liked);
post.user_liked = Boolean(liked);
}

function normalizeComment(comment) {
return {
id: Number(comment?.id || 0),
userId: Number(comment?.user_id || comment?.author_id || 0),
username: comment?.username || comment?.user_name || comment?.author || 'User',
content: comment?.content || comment?.comment || comment?.text || '',
parentCommentId: comment?.parent_comment_id ? Number(comment.parent_comment_id) : null,
createdAt: comment?.created_at || comment?.createdAt || null
};
}

function buildEmojiPickerHtml(postId) {
return COMMENT_EMOJIS.map((emoji) => `<button class="emoji-option" type="button" data-emoji-value="${emoji}" data-emoji-post="${postId}">${emoji}</button>`).join('');
}

function getReplyDraft(postId) {
return replyDraftByPostId.get(Number(postId)) || null;
}

function isThreadCollapsed(commentId) {
if (!collapsedThreadByCommentId.has(commentId)) {
collapsedThreadByCommentId.set(commentId, true);
}
return collapsedThreadByCommentId.get(commentId) === true;
}

function renderCommentThreadHtml(post) {
const normalizedComments = (Array.isArray(post.comments) ? post.comments : [])
.map(normalizeComment)
.sort((a, b) => new Date(a.createdAt || 0).getTime() - new Date(b.createdAt || 0).getTime());

if (normalizedComments.length === 0) {
return '<div class="comment">No comments yet.</div>';
}

const byParent = new Map();
normalizedComments.forEach((comment) => {
const key = comment.parentCommentId || 0;
if (!byParent.has(key)) byParent.set(key, []);
byParent.get(key).push(comment);
});

const renderLevel = (parentId, depth, rootCommentId = null) => {
const nodes = byParent.get(parentId) || [];
return nodes.map((comment) => {
const clampedDepth = Math.min(depth, 4);
const indentStyle = clampedDepth > 0 ? ` style="margin-left:${clampedDepth * 16}px"` : '';
const children = byParent.get(comment.id) || [];
const hasChildren = children.length > 0;
const collapsed = hasChildren ? isThreadCollapsed(comment.id) : false;
const currentRootId = rootCommentId || comment.id;
const parentForReply = depth >= MAX_REPLY_DEPTH ? currentRootId : comment.id;
const depthNote = depth >= MAX_REPLY_DEPTH ? ` (max depth reached - replies stay under ${escapeHtml(comment.username)}'s main thread)` : '';
return `
<div class="comment${clampedDepth > 0 ? ' comment-reply' : ''}"${indentStyle}>
<div><strong>${escapeHtml(comment.username)}</strong> ${escapeHtml(comment.content)}</div>
<div class="comment-meta">
<span>${comment.createdAt ? formatClockTime(comment.createdAt) : ''}</span>
<div>
${hasChildren ? `<button class="action comment-reply-btn" type="button" data-toggle-thread="${comment.id}">${collapsed ? `Show replies (${children.length})` : 'Hide replies'}</button>` : ''}

function normalizeNotification(item) {
const actorName = (item.actor_username || item.actor_name || '').trim();
const type = (item.type || '').toLowerCase();
let resolvedText = item.text || item.message || '';
let actionText = '';

if (actorName && type === 'like') {
actionText = 'liked your post.';
resolvedText = `${actorName} ${actionText}`;
}

if (actorName && type === 'comment') {
const serverMessage = (item.message || '').trim();
actionText = serverMessage || 'commented on your post.';
resolvedText = `${actorName} ${actionText}`;
}

if (actorName && type === 'reply') {
const serverMessage = (item.message || '').trim();
actionText = serverMessage || 'replied to your comment.';
resolvedText = `${actorName} ${actionText}`;
}

return {
id: Number(item.id || 0),
text: resolvedText,
actorName: actorName || '',
actionText,
timestamp: item.created_at ? new Date(item.created_at).getTime() : (item.timestamp || Date.now()),
is_read: Number(item.is_read || 0) === 1
};
}

function upsertNotifications(items, countUnread = false) {
let unreadDelta = 0;
items.forEach((raw) => {
const item = normalizeNotification(raw);
if (item.id > latestNotificationId) latestNotificationId = item.id;
const exists = notifications.some((entry) => Number(entry.id) === Number(item.id));
if (!exists) {
notifications.unshift(item);
if (countUnread && !item.is_read) unreadDelta += 1;
}
});

if (unreadDelta > 0) unreadNotifications += unreadDelta;
notifications.sort((a, b) => Number(b.id || 0) - Number(a.id || 0));
renderNotifications();
}

function pushNotification(text) {
notifications.unshift({
id: `${Date.now()}-${Math.random().toString(36).slice(2, 8)}`,
text,
timestamp: Date.now()
});
unreadNotifications += 1;
debugState.lastEvent = text;
renderNotifications();
renderDebugPanel();
}

function markNotificationsRead() {
unreadNotifications = 0;
renderNotifications();
api.markNotificationsRead().catch((error) => {
console.error('Failed to mark notifications read', error);
});
}

function setBaselineFromPosts(postList) {

);

}

function mergeInteractionStateIntoPosts(latestPosts) {
if (!Array.isArray(latestPosts) || latestPosts.length === 0) return false;

const latestById = new Map(latestPosts.map((item) => [Number(item.id), item]));
let changed = false;

posts.forEach((post) => {
const serverPost = latestById.get(Number(post.id));
if (!serverPost) return;

const nextLikeCount = Number(serverPost.likes || serverPost.like_count || 0);
const nextCommentCount = Number(serverPost.comments || serverPost.comment_count || 0);
const nextLikedByUser = Number(serverPost.liked_by_user || 0) === 1;

if (getPostLikeCount(post) !== nextLikeCount) {
setPostLikeCount(post, nextLikeCount);
changed = true;
}

if (getPostCommentCount(post) !== nextCommentCount) {
setPostCommentCount(post, nextCommentCount);
changed = true;
}

if (getPostLikedByUser(post) !== nextLikedByUser) {
setPostLikedByUser(post, nextLikedByUser);
changed = true;
}
});

return changed;
}

async function handleBadgeShareFromChallenges() {
const params = new URLSearchParams(window.location.search);
const shouldShareBadge = params.get('shareBadge') === 'true';
if (!shouldShareBadge) return;

const rawBadge = localStorage.getItem(BADGE_SHARE_STORAGE_KEY);
if (!rawBadge) return;

let badgeData = null;
try {
badgeData = JSON.parse(rawBadge);
} catch (error) {
console.error('Invalid badge data', error);
return;
}

if (!badgeData || !badgeData.name || !badgeData.icon || !badgeData.timestamp) return;

const lastConsumed = Number(localStorage.getItem(BADGE_SHARE_CONSUMED_KEY) || 0);
if (Number(badgeData.timestamp) <= lastConsumed) {
const cleanUrl = `${window.location.pathname}`;
window.history.replaceState({}, '', cleanUrl);
return;
}

const tempPostId = Number(`9${Date.now().toString().slice(-10)}`);
createLocalBadgePost(badgeData, { optimistic: true, localId: tempPostId });

try {
const response = await api.createPost(`🏅 I just earned the "${badgeData.name}" badge! ${badgeData.icon}`);
const created = response.data || {};
created.badge_name = badgeData.name;
created.badge_icon = badgeData.icon;
const replaced = replacePostById(tempPostId, created);
if (!replaced) {
posts.unshift(created);
}
showStatus('Badge shared to feed');
} catch (error) {
console.error('Badge share API failed, keeping local badge post', error);
showStatus('Badge saved locally (sync failed)');
}

localStorage.setItem(BADGE_SHARE_CONSUMED_KEY, String(badgeData.timestamp));
const cleanUrl = `${window.location.pathname}`;
window.history.replaceState({}, '', cleanUrl);
renderFeed();
}

function startNotificationStream() {
if (notificationStream || !api.getNotificationsStreamUrl) return;
const streamUrl = api.getNotificationsStreamUrl(latestNotificationId);
if (!streamUrl || typeof EventSource === 'undefined') {
startNotificationPolling();
return;
}

notificationStream = new EventSource(streamUrl);

notificationStream.onopen = () => {
stopNotificationPolling();
};

notificationStream.addEventListener('notifications', (event) => {
try {
const items = JSON.parse(event.data);
if (Array.isArray(items) && items.length > 0) {
upsertNotifications(items, true);
}
} catch (error) {
console.error('Invalid notification stream payload', error);
}
});

notificationStream.onerror = () => {
if (notificationStream) {
notificationStream.close();
notificationStream = null;
}
startNotificationPolling();
if (!notificationStreamRetryTimer) {
notificationStreamRetryTimer = window.setTimeout(() => {
notificationStreamRetryTimer = null;
startNotificationStream();
}, 8000);
}
};
}

input.value = `${current.slice(0, start)}${value}${current.slice(end)}`;

const trimmed = String(next).trim();

const post = posts.find((p) => Number(p.id) === Number(postId));

const shouldDelete = window.confirm('Delete this comment? Replies will also be removed.');
if (!shouldDelete) return;

try {
await api.deleteComment(commentId);
const beforeCount = post.comments.length;
post.comments = post.comments.filter((raw) => Number(raw.id || normalizeComment(raw).id) !== Number(commentId) && Number(normalizeComment(raw).parentCommentId || 0) !== Number(commentId));
const removedCount = Math.max(1, beforeCount - post.comments.length);
setPostCommentCount(post, Math.max(0, getPostCommentCount(post) - removedCount));
const openIds = getOpenCommentPostIds();
renderFeed();
restoreOpenCommentPostIds(openIds);

} catch (error) {
showStatus('Error: ' + error.message);
}

setPostLikedByUser(post, false);
setPostLikeCount(post, getPostLikeCount(post) - 1);
showStatus('Like removed');
} else {
await api.likePost(postId);
setPostLikedByUser(post, true);
setPostLikeCount(post, getPostLikeCount(post) + 1);
showStatus('Liked!');

renderFeed();
} catch (error) {
showStatus('Error: ' + error.message);

if (reopened) reopened.classList.add('open');
} catch (error) {
console.error('Could not load comments', error);
}
}
return;
}

if (button.dataset.action === 'delete') {
if (!isOwnPost(post)) {
showStatus('You can only delete your own posts');
return;
}

const shouldDelete = window.confirm('Delete this post? This cannot be undone.');
if (!shouldDelete) return;

try {
await api.deletePost(postId);
posts = posts.filter((item) => Number(item.id) !== postId);
postInteractionBaseline.delete(postId);
renderFeed();
showStatus('Post deleted');
} catch (error) {
showStatus('Error: ' + error.message);
}
return;
}

if (button.dataset.commentPost) {
const input = feedEl.querySelector(`[data-comment-input="${postId}"]`);
const comment = input.value.trim();
if (!comment) return;
const replyDraft = getReplyDraft(postId);
const parentCommentId = replyDraft ? Number(replyDraft.commentId) : null;

try {
const response = await api.createComment(postId, comment, parentCommentId);
if (!Array.isArray(post.comments)) post.comments = [];
const serverComment = response?.data ? normalizeComment(response.data) : null;
post.comments.push(serverComment || {
id: Number(`9${Date.now().toString().slice(-10)}`),
username: currentUser?.username || 'You',
content: comment,
parentCommentId: parentCommentId || null,
createdAt: new Date().toISOString()
});
if (replyDraft) {
replyDraftByPostId.delete(postId);
}
post.comments_loaded = true;
setPostCommentCount(post, getPostCommentCount(post) + 1);
input.value = '';
showStatus('Comment posted!');
renderFeed();
const commentsDiv = feedEl.querySelector(`[data-comments="${postId}"]`);
if (commentsDiv) commentsDiv.classList.add('open');
} catch (error) {
showStatus('Error: ' + error.message);
}
}
});

// Load feed on page load
async function initFeedPage() {
await initializeCurrentUser();
await loadNotifications();
renderDebugPanel();
await loadFeed();
await handleBadgeShareFromChallenges();
startNotificationStream();

if (currentUserId) {
const myPosts = await fetchMyPostsForNotifications();
setBaselineFromPosts(myPosts);
startLiveInteractionSync();
}
}

initFeedPage();

notifBellBtn.addEventListener('click', () => {
notifPanel.classList.toggle('open');
if (notifPanel.classList.contains('open')) {
markNotificationsRead();
}
});

document.addEventListener('click', (event) => {
if (!event.target.closest('#notifBellBtn') && !event.target.closest('#notifPanel')) {
notifPanel.classList.remove('open');
}

if (!event.target.closest('[data-emoji-toggle]') && !event.target.closest('[data-emoji-picker]')) {
feedEl.querySelectorAll('[data-emoji-picker].open').forEach((picker) => {
picker.classList.remove('open');
});

notifList.addEventListener('click', async (event) => {
const btn = event.target.closest('button[data-delete-notification]');
if (!btn) return;
const id = Number(btn.dataset.deleteNotification || 0);
if (!id) return;

try {
await api.deleteNotification(id);
const removed = notifications.find((n) => Number(n.id) === id);
notifications = notifications.filter((n) => Number(n.id) !== id);
if (removed && removed.is_read === false) {
unreadNotifications = Math.max(0, unreadNotifications - 1);
}
renderNotifications();
} catch (error) {
showStatus('Error: ' + error.message);
}
});
}
});
</script>
