<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WasteLess - Community Feed</title>
<!-- Favicon -->
<link rel="icon" type="image/svg+xml" href="/logo.png">
<script src="/api.service.js"></script>
<style>
* {
margin: 0;
padding: 0;
box-sizing: border-box;
font-family: 'Segoe UI', sans-serif;
}

:root {
--green-900: #1f5f27;
--green-800: #2e7d32;
--green-700: #43a047;
--green-100: #e9f6eb;
--green-50: #f6fbf7;
--text-900: #16301a;
--text-700: #4f5f52;
--line: #d8e6d9;
}

body {
min-height: 100vh;
background: #f7faf8;
color: var(--text-900);
}

.dashboard-shell {
min-height: 100vh;
display: flex;
}

.sidebar {
position: fixed;
inset: 0 auto 0 0;
width: 260px;
padding: 28px 18px;
background: linear-gradient(180deg, var(--green-900), var(--green-800));
color: #fff;
display: flex;
flex-direction: column;
gap: 28px;
box-shadow: 15px 0 40px rgba(0, 0, 0, 0.08);
}

.brand {
padding: 10px 12px 4px;
}

.brand h1 {
font-size: 30px;
line-height: 1;
margin-bottom: 8px;
}

.brand p {
font-size: 13px;
line-height: 1.5;
color: rgba(255, 255, 255, 0.8);
}

.nav {
display: flex;
flex-direction: column;
gap: 8px;
}

.nav-item {
display: flex;
align-items: center;
gap: 12px;
padding: 14px 16px;
border-radius: 14px;
color: rgba(255, 255, 255, 0.88);
text-decoration: none;
font-size: 14px;
font-weight: 600;
transition: background 0.2s ease, transform 0.2s ease;
}

.nav-item:hover {
background: rgba(255, 255, 255, 0.08);
transform: translateX(2px);
}

.nav-item.active {
background: rgba(255, 255, 255, 0.16);
box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.12);
}

.nav-icon {
width: 20px;
height: 20px;
flex: 0 0 20px;
stroke: currentColor;
stroke-width: 1.9;
fill: none;
stroke-linecap: round;
stroke-linejoin: round;
}

.sidebar-footer {
margin-top: auto;
padding: 8px;
}

.logout-btn {
width: 100%;
border: 1px solid rgba(255, 255, 255, 0.35);
background: rgba(255, 255, 255, 0.1);
color: #fff;
padding: 11px 14px;
border-radius: 12px;
font-size: 13px;
font-weight: 700;
cursor: pointer;
transition: background 0.2s ease, transform 0.2s ease;
}

.logout-btn:hover {
background: rgba(255, 255, 255, 0.2);
transform: translateY(-1px);
}

.main {
margin-left: 260px;
width: calc(100% - 260px);
padding: 28px;
}

.page {
width: min(860px, 100%);
margin: 0 auto;
padding: 0;
}

.header {
display: flex;
justify-content: space-between;
align-items: center;
gap: 16px;
margin-bottom: 18px;
}

.header h1 {
font-size: 30px;
font-weight: 700;
margin-bottom: 6px;
}

.header p {
font-size: 14px;
color: var(--text-700);
}

.notif-bell {
width: 42px;
height: 42px;
border-radius: 12px;
border: 1px solid var(--line);
background: #fff;
color: var(--green-800);
display: inline-flex;
align-items: center;
justify-content: center;
line-height: 0;
position: relative;
cursor: pointer;
transition: background 0.2s ease, transform 0.2s ease;
}

.notif-bell:hover {
background: var(--green-50);
transform: translateY(-1px);
}

.notif-bell svg {
width: 18px;
height: 18px;
stroke: currentColor;
stroke-width: 1.9;
fill: none;
stroke-linecap: round;
stroke-linejoin: round;
}

.notif-dot {
position: absolute;
top: -6px;
right: -6px;
min-width: 18px;
height: 18px;
padding: 0 5px;
border-radius: 999px;
background: #e53935;
color: #fff;
font-size: 11px;
font-weight: 700;
display: inline-flex;
align-items: center;
justify-content: center;
line-height: 1;
border: 2px solid #fff;
}

.notif-dot.hidden {
display: none;
}

.notif-panel {
display: none;
position: absolute;
top: 52px;
right: 0;
width: min(360px, 88vw);
max-height: 360px;
overflow-y: auto;
background: #fff;
border: 1px solid var(--line);
border-radius: 14px;
box-shadow: 0 18px 45px rgba(0, 0, 0, 0.12);
padding: 10px;
z-index: 20;
}

.notif-panel.open {
display: block;
}

.notif-title {
font-size: 13px;
font-weight: 700;
color: var(--text-900);
padding: 6px 6px 10px;
border-bottom: 1px solid #edf2ee;
margin-bottom: 8px;
}

.notif-item {
padding: 10px;
border: 1px solid #edf3ee;
background: #f9fcfa;
border-radius: 10px;
font-size: 13px;
color: #344a37;
margin-bottom: 8px;
position: relative;
}

.notif-item:last-child {
margin-bottom: 0;
}

.notif-time {
display: block;
margin-top: 4px;
font-size: 11px;
color: var(--text-700);
}

.notif-delete {
position: absolute;
right: 8px;
top: 8px;
border: 1px solid #e5efe6;
background: #fff;
border-radius: 999px;
width: 26px;
height: 26px;
display: grid;
place-items: center;
cursor: pointer;
color: #5b6f5e;
font-weight: 800;
line-height: 1;
}

.notif-delete:hover {
background: #f4faf4;
}

.notif-empty {
font-size: 13px;
color: var(--text-700);
padding: 12px;
text-align: center;
}

.notif-icon {
margin-right: 6px;
font-size: 14px;
}

.notif-item.unread {
background: #e8f4fd;
border-color: #cce4f7;
}

.notif-item .notif-type {
display: inline-block;
padding: 2px 6px;
border-radius: 4px;
font-size: 10px;
font-weight: 700;
text-transform: uppercase;
margin-bottom: 4px;
}

.notif-item .notif-type.like {
background: #ffebee;
color: #c62828;
}

.notif-item .notif-type.comment {
background: #e3f2fd;
color: #1565c0;
}

.notif-item .notif-type.reply {
background: #e8f5e9;
color: #2e7d32;
}

.debug-panel {
margin-top: 12px;
padding: 12px;
border: 1px dashed #c9ddcc;
background: #f8fcf9;
border-radius: 10px;
font-size: 12px;
color: #37503b;
display: none;
}

.debug-panel.show {
display: block;
}

.debug-line {
margin: 3px 0;
word-break: break-word;
}

.panel {
background: #fff;
border: 1px solid var(--line);
border-radius: 16px;
padding: 16px;
}

.composer {
display: flex;
gap: 10px;
align-items: flex-start;
}

.composer input,
.comment-form input {
width: 100%;
padding: 11px 12px;
border-radius: 12px;
border: 1px solid #dbe7dc;
outline: none;
font-size: 14px;
background: #fff;
}

.composer input:focus,
.comment-form input:focus {
border-color: var(--green-700);
}

.btn {
border: 1px solid #d8e6d9;
background: #fff;
color: #2e7d32;
padding: 10px 14px;
border-radius: 12px;
font-size: 13px;
font-weight: 600;
cursor: pointer;
white-space: nowrap;
}

.btn:hover {
background: var(--green-50);
}

.suggestion {
margin-top: 14px;
display: flex;
justify-content: space-between;
align-items: center;
gap: 12px;
padding: 14px 16px;
border: 1px solid #dceadc;
border-radius: 16px;
background: #fbfefb;
}

.suggestion p {
font-size: 14px;
color: var(--text-900);
}

.feed {
margin-top: 18px;
background: #fff;
border: 1px solid var(--line);
border-radius: 16px;
overflow: hidden;
}

.post {
padding: 16px 18px;
border-bottom: 1px solid #edf2ee;
}

.post:last-child {
border-bottom: none;
}

.post-top {
display: flex;
justify-content: space-between;
align-items: flex-start;
gap: 12px;
margin-bottom: 8px;
}

.name {
font-size: 15px;
font-weight: 700;
margin-bottom: 3px;
}

.time {
font-size: 12px;
color: var(--text-700);
white-space: nowrap;
}

.message {
font-size: 14px;
line-height: 1.55;
color: #2f4032;
margin-bottom: 8px;
}

.detail {
font-size: 13px;
color: var(--text-700);
margin-bottom: 12px;
}

.actions {
display: flex;
gap: 8px;
align-items: center;
margin-bottom: 12px;
}

.action-count {
font-weight: 600;
}

.action {
border: 1px solid #d8e6d9;
background: #fff;
border-radius: 999px;
padding: 7px 11px;
font-size: 12px;
font-weight: 600;
cursor: pointer;
color: #355539;
}

.action.active {
border-color: #b9d8bc;
background: var(--green-50);
color: var(--green-800);
}

.comments {
border-top: 1px solid #edf2ee;
padding-top: 12px;
display: none;
}

.comments.open {
display: block;
}

.comment-list {
display: flex;
flex-direction: column;
gap: 8px;
margin-bottom: 12px;
}

.comment {
font-size: 13px;
color: #3b4c3e;
padding: 8px 10px;
border-radius: 10px;
background: #f8fbf8;
border: 1px solid #edf3ee;
}

.comment-author {
display: inline-flex;
align-items: center;
gap: 4px;
font-weight: 700;
color: var(--green-800);
}

.comment-author-avatar {
width: 20px;
height: 20px;
border-radius: 50%;
background: var(--green-100);
display: inline-flex;
align-items: center;
justify-content: center;
font-size: 10px;
font-weight: 700;
color: var(--green-800);
text-transform: uppercase;
}

.comment-reply {
background: #fbfdfb;
border-left: 3px solid #d8ead9;
position: relative;
}

.comment-reply::before {
content: '';
position: absolute;
left: -11px;
top: 14px;
width: 10px;
height: 0;
border-top: 1px solid #d8ead9;
}

.comment-meta {
display: flex;
justify-content: space-between;
align-items: center;
gap: 8px;
margin-top: 6px;
font-size: 11px;
color: #6a7f6d;
}

.comment-reply-btn {
font-size: 11px;
padding: 4px 8px;
}

.comment-meta > div {
display: flex;
gap: 6px;
align-items: center;
}

.comment-own-actions {
display: flex;
gap: 6px;
align-items: center;
}

.comment-own-actions .action {
font-size: 11px;
padding: 4px 8px;
}

.replying-banner {
display: flex;
align-items: center;
justify-content: space-between;
gap: 8px;
font-size: 12px;
color: #3b5a40;
margin-bottom: 8px;
padding: 6px 8px;
border: 1px solid #e1ece2;
border-radius: 8px;
background: #f7fbf7;
}

.replying-banner span {
font-size: 11px;
color: #5f7764;
}

.comment-form {
display: flex;
gap: 8px;
align-items: center;
position: relative;
}

.comment-form .btn {
padding: 9px 12px;
}

.emoji-btn {
min-width: 40px;
padding: 9px 10px;
}

.emoji-picker {
position: absolute;
left: 0;
top: calc(100% + 6px);
display: none;
gap: 4px;
flex-wrap: wrap;
background: #fff;
border: 1px solid #d8e6d9;
border-radius: 10px;
padding: 8px;
max-width: 220px;
z-index: 10;
box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
}

.emoji-picker.open {
display: flex;
}

.emoji-option {
border: 1px solid #e3eee4;
background: #fff;
border-radius: 8px;
padding: 4px 6px;
cursor: pointer;
font-size: 16px;
line-height: 1;
}

.emoji-option:hover {
background: #f4faf4;
}

.status {
margin-top: 12px;
font-size: 13px;
color: var(--green-800);
min-height: 18px;
}

.empty {
padding: 18px;
font-size: 14px;
color: var(--text-700);
}

.post.badge-post {
display: flex;
flex-direction: column;
align-items: center;
text-align: center;
padding: 24px 18px;
}

.badge-display {
display: flex;
flex-direction: column;
align-items: center;
gap: 12px;
margin-bottom: 14px;
}

.badge-icon-large {
font-size: 56px;
}

.badge-name-post {
font-size: 18px;
font-weight: 700;
color: var(--text-900);
}

.badge-subtitle {
font-size: 13px;
color: var(--text-700);
}

@media (max-width: 640px) {

.sidebar {
position: static;
width: 100%;
border-radius: 0 0 22px 22px;
}

.main {
margin-left: 0;
width: 100%;
padding: 16px;
}

.page {
width: min(100%, 860px);
}

.composer,
.suggestion,
.comment-form,
.post-top {
flex-direction: column;
align-items: stretch;
}

.header {
align-items: flex-start;
}

.time {
white-space: normal;
}
}
</style>
</head>
<body>
<div class="dashboard-shell">

<div class="brand">
<h1 style="display:flex;align-items:center;gap:10px;">
	<img src="/logo.png" alt="WasteLess Logo" style="height:34px;width:auto;display:inline-block;vertical-align:middle;">

</h1>
<p>Manage waste tracking, insights, and sustainable actions from one place.</p>

<nav class="nav" aria-label="Primary">

<main class="main">
<section class="page">
<header class="header">
<div>
<h1>Community Feed</h1>
<p>Recent updates</p>
</div>
<div style="position: relative;">
<button class="notif-bell" id="notifBellBtn" type="button" aria-label="Notifications" title="Notifications">
<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6 9a6 6 0 1 1 12 0v5l2 2H4l2-2z"></path><path d="M10 18a2 2 0 0 0 4 0"></path></svg>
<span class="notif-dot hidden" id="notifDot">0</span>

<div class="debug-line" id="debugPollLine">Last poll: -</div>
<div class="debug-line" id="debugTrackedLine">Tracked posts: -</div>
<div class="debug-line" id="debugLastEventLine">Last event: -</div>

</div>

<script>
// Authentication check
if (!api.isAuthenticated()) {
	window.location.href = 'index.html';
}

function handleLogout() {
	api.logout();
	window.location.href = 'index.html';
}

const feedEl = document.getElementById('feed');
const postInput = document.getElementById('postInput');
const postBtn = document.getElementById('postBtn');
const shareBtn = document.getElementById('shareBtn');
const composerStatus = document.getElementById('composerStatus');
const notifBellBtn = document.getElementById('notifBellBtn');
const notifDot = document.getElementById('notifDot');
const notifPanel = document.getElementById('notifPanel');
const notifList = document.getElementById('notifList');

let posts = [];
let currentUser = null;
let notifications = [];
let unreadNotifications = 0;

function showStatus(text) {
	composerStatus.textContent = text;
	setTimeout(() => {
		if (composerStatus.textContent === text) composerStatus.textContent = '';
	}, 2200);
}

function escapeHtml(text) {
	return text.replace(/[&<>"]/g, (char) => ({
		'&': '&amp;',
		'<': '&lt;',
		'>': '&gt;',
		'"': '&quot;'
	}[char]));
}

function timeAgo(timestamp) {
	const now = new Date();
	const time = new Date(timestamp);
	const diffMs = now - time;
	const diffMins = Math.floor(diffMs / 60000);
	const diffHours = Math.floor(diffMs / 3600000);
	const diffDays = Math.floor(diffMs / 86400000);

	if (diffMins < 1) return 'just now';
	if (diffMins < 60) return `${diffMins}m ago`;
	if (diffHours < 24) return `${diffHours}h ago`;
	if (diffDays < 7) return `${diffDays}d ago`;
	return time.toLocaleDateString();
}

// Fetch and display feed
async function loadFeed() {
	try {
		const response = await api.getFeed();
		posts = response.data || [];
		renderFeed();
	} catch (error) {
		console.error('Error loading feed:', error);
		showStatus('Error loading feed');
	}
}

function renderFeed() {
	if (posts.length === 0) {
		feedEl.innerHTML = '<div class="empty">No posts yet. Be the first to share!</div>';
		return;
	}

	feedEl.innerHTML = posts.map(post => `
		<div class="post" data-post-id="${post.id}">
			<div class="post-top">
				<div>
					<div class="name">${escapeHtml(post.author_name || post.username || 'User')}</div>
					<div class="time">${timeAgo(post.created_at)}</div>
				</div>
			</div>
			<div class="message">${escapeHtml(post.content)}</div>
			<div class="actions">
				<button class="action ${post.liked_by_user ? 'active' : ''}" onclick="handleLike(${post.id})">
					👍 <span class="action-count">${post.like_count || 0}</span>
				</button>
				<button class="action" onclick="toggleComments(${post.id})">
					💬 <span class="action-count">${post.comment_count || 0}</span>
				</button>
			</div>
			<div class="comments" id="comments-${post.id}">
				<div class="comment-list" id="comment-list-${post.id}"></div>
				<div class="comment-form">
					<input type="text" placeholder="Add a comment..." maxlength="120" id="comment-input-${post.id}">
					<button class="btn" onclick="handleComment(${post.id})">Reply</button>
				</div>
			</div>
		</div>
	`).join('');
}

// Handle post creation
postBtn.addEventListener('click', async () => {
	const content = postInput.value.trim();
	if (!content) {
		showStatus('Please enter some text');
		return;
	}

	postBtn.disabled = true;
	postBtn.textContent = 'Posting...';

	try {
		await api.createPost(content);
		postInput.value = '';
		showStatus('Post created successfully!');
		loadFeed();
	} catch (error) {
		showStatus('Error creating post');
		console.error(error);
	} finally {
		postBtn.disabled = false;
		postBtn.textContent = 'Post';
	}
});

// Handle like
async function handleLike(postId) {
	try {
		const post = posts.find(p => p.id === postId);
		if (!post) return;

		if (post.liked_by_user) {
			await api.unlikePost(postId);
			post.liked_by_user = false;
			post.like_count = Math.max(0, (post.like_count || 1) - 1);
		} else {
			await api.likePost(postId);
			post.liked_by_user = true;
			post.like_count = (post.like_count || 0) + 1;
		}
		renderFeed();
	} catch (error) {
		showStatus('Error updating like');
		console.error(error);
	}
}

// Toggle comments
async function toggleComments(postId) {
	const commentsEl = document.getElementById(`comments-${postId}`);
	if (commentsEl) {
		const isOpening = !commentsEl.classList.contains('open');
		commentsEl.classList.toggle('open');
		if (isOpening) {
			await loadComments(postId);
		}
	}
}

async function loadComments(postId) {
	try {
		const response = await api.getComments(postId);
		const comments = response.data?.comments || [];
		renderComments(postId, comments);
	} catch (error) {
		console.error('Error loading comments:', error);
	}
}

function renderComments(postId, comments) {
	const listEl = document.getElementById(`comment-list-${postId}`);
	if (!listEl) return;
	
	if (comments.length === 0) {
		listEl.innerHTML = '<div style="font-size:12px; color:#666; text-align:center; padding: 4px;">No comments yet.</div>';
		return;
	}
	
	listEl.innerHTML = comments.map(c => `
		<div class="comment">
			<div class="comment-author">
				<div class="comment-author-avatar">${(c.username || 'U').charAt(0)}</div>
				${escapeHtml(c.username || 'User')}
			</div>
			<div style="margin-top: 4px;">${escapeHtml(c.content)}</div>
			<div class="comment-meta">
				<span>${timeAgo(c.created_at)}</span>
			</div>
		</div>
	`).join('');
}

// Handle comment
async function handleComment(postId) {
	const inputEl = document.getElementById(`comment-input-${postId}`);
	const content = inputEl.value.trim();
	if (!content) {
		showStatus('Please enter a comment');
		return;
	}

	try {
		await api.createComment(postId, content);
		inputEl.value = '';
		await loadComments(postId);
		
		// Update comment count locally
		const post = posts.find(p => p.id === postId);
		if (post) {
			post.comment_count = (post.comment_count || 0) + 1;
			renderFeed();
			// Re-open comments since renderFeed closed it
			document.getElementById(`comments-${postId}`)?.classList.add('open');
			await loadComments(postId);
		}
		
		showStatus('Comment added!');
	} catch (error) {
		showStatus('Error adding comment');
		console.error(error);
	}
}

// Notifications toggle
notifBellBtn.addEventListener('click', () => {
	notifPanel.classList.toggle('open');
});

// Load initial feed
loadFeed();

// Refresh feed every 30 seconds
setInterval(loadFeed, 30000);
</script>
